<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 블로그 키워드 경쟁도 분석기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --naver: #03C75A;
            --naver-dark: #02a84d;
            --naver-light: #e8f8ef;
            --bg: #f5f6f8;
            --white: #ffffff;
            --text: #1e1e1e;
            --text-sub: #666666;
            --text-light: #999999;
            --border: #e5e8eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* Header */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0;
        }
        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-logo {
            width: 40px; height: 40px;
            background: var(--naver);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1.2rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text);
        }
        .header p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 24px 20px 40px; }

        /* Card Base */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }

        /* Keyword Input */
        .kw-input-wrap {
            display: flex;
            gap: 8px;
        }
        .kw-input-wrap input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: var(--bg);
        }
        .kw-input-wrap input:focus {
            border-color: var(--naver);
            background: #fff;
        }
        .kw-input-wrap input::placeholder { color: #bbb; }

        .btn-add {
            padding: 14px 24px;
            background: linear-gradient(135deg, #1a3a8a, #2e6ccf);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-add:hover { background: linear-gradient(135deg, #15307a, #2660c0); }

        /* Tags */
        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
            min-height: 10px;
        }
        .keyword-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--naver-light);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--naver-dark);
        }
        .keyword-tag .remove {
            cursor: pointer;
            font-size: 1rem;
            color: var(--naver);
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .keyword-tag .remove:hover { opacity: 1; }

        /* Action */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .btn-analyze {
            padding: 16px 48px;
            background: linear-gradient(135deg, #1a3a8a, #2e6ccf);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(26,58,138,0.3);
        }
        .btn-analyze:hover { background: linear-gradient(135deg, #15307a, #2660c0); transform: translateY(-1px); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-reset {
            padding: 16px 28px;
            background: var(--white);
            color: var(--text-sub);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
        .btn-reset:hover { background: var(--bg); }

        /* Loading */
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.visible { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--naver);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        .loading p { color: var(--text-sub); font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results { display: none; }
        .results.visible { display: block; }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .results-header h2 { font-size: 1.15rem; font-weight: 900; }
        .toggle-wrap {
            display: flex;
            gap: 0;
            background: var(--bg);
            border-radius: 10px;
            padding: 3px;
            border: 1px solid var(--border);
        }
        .toggle-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .toggle-btn.active { background: linear-gradient(135deg, #1a3a8a, #2e6ccf); color: #fff; }
        .btn-csv {
            padding: 8px 16px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            color: var(--text-sub);
        }
        .btn-csv:hover { border-color: var(--naver); color: var(--naver); }

        /* Result Cards Grid */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }
        .r-card {
            background: var(--white);
            border-radius: 14px;
            padding: 22px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.2s;
            position: relative;
        }
        .r-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .r-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .r-card-keyword { font-size: 1.05rem; font-weight: 700; color: var(--text); flex: 1; }
        .r-grade-wrap { text-align: center; margin-left: 12px; }
        .r-grade {
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 900;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .r-grade-label { font-size: 0.65rem; font-weight: 700; margin-top: 4px; }

        /* Grade Colors */
        .g-S .r-grade { background: linear-gradient(135deg, #ff6fd8, #c471f5); color: #fff; }
        .g-S .r-grade-label { color: #c471f5; }
        .g-A .r-grade { background: #e8f8ef; color: #03C75A; border: 2px solid #03C75A; }
        .g-A .r-grade-label { color: #03C75A; }
        .g-B .r-grade { background: #e8f8ef; color: #2ecc71; border: 2px solid #2ecc71; }
        .g-B .r-grade-label { color: #2ecc71; }
        .g-C .r-grade { background: #fff9e6; color: #f39c12; border: 2px solid #f39c12; }
        .g-C .r-grade-label { color: #f39c12; }
        .g-D .r-grade { background: #fff3e6; color: #e67e22; border: 2px solid #e67e22; }
        .g-D .r-grade-label { color: #e67e22; }
        .g-E .r-grade { background: #fde8e8; color: #e74c3c; border: 2px solid #e74c3c; }
        .g-E .r-grade-label { color: #e74c3c; }
        .g-F .r-grade { background: #fde8e8; color: #c0392b; border: 2px solid #c0392b; }
        .g-F .r-grade-label { color: #c0392b; }

        .r-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .r-stat {
            background: var(--bg);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .r-stat-label { font-size: 0.7rem; color: var(--text-light); }
        .r-stat-value { font-size: 1rem; font-weight: 700; color: var(--text); }

        .r-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 10px;
        }
        .r-comp-label { font-size: 0.8rem; color: var(--text-sub); }
        .r-comp-value { font-size: 0.95rem; font-weight: 700; }

        /* Summary Table */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .summary-table thead th {
            padding: 12px 10px;
            background: var(--bg);
            color: var(--text-sub);
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid var(--border);
        }
        .summary-table thead th:first-child { text-align: left; border-radius: 8px 0 0 0; }
        .summary-table thead th:last-child { border-radius: 0 8px 0 0; }
        .summary-table tbody td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .summary-table tbody td:first-child { text-align: left; font-weight: 600; }
        .summary-table tbody tr:hover { background: #fafbfc; }

        .grade-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
        }
        .pill-S { background: linear-gradient(135deg, #ff6fd822, #c471f522); color: #c471f5; }
        .pill-A { background: #e8f8ef; color: #03C75A; }
        .pill-B { background: #e8f8ef; color: #2ecc71; }
        .pill-C { background: #fff9e6; color: #f39c12; }
        .pill-D { background: #fff3e6; color: #e67e22; }
        .pill-E { background: #fde8e8; color: #e74c3c; }
        .pill-F { background: #fde8e8; color: #c0392b; }

        /* Legend */
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 10px;
        }
        .legend-badge {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.9rem; flex-shrink: 0;
        }
        .legend-desc { font-size: 0.8rem; font-weight: 600; color: var(--text); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 20px;
            color: var(--text-light);
            font-size: 0.75rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            z-index: 1000;
            transition: transform 0.3s;
            box-shadow: var(--shadow-lg);
        }
        .toast.visible { transform: translateX(-50%) translateY(0); }
        .toast.error { border-left: 4px solid #e74c3c; }
        .toast.success { border-left: 4px solid var(--naver); }

        /* Mobile */
        @media (max-width: 768px) {
            .result-grid { grid-template-columns: 1fr; }
            .legend-grid { grid-template-columns: 1fr 1fr; }
            .kw-input-wrap { flex-direction: column; }
            .header-inner { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">
        <div style="width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;">
            <img src="logo.png" alt="KEYPLAT" style="width:180%;height:180%;margin:-40% 0 0 -40%;display:block;">
        </div>
        <div>
            <h1>네이버 블로그 키워드 경쟁도 분석기</h1>
            <p>키워드를 입력하면 경쟁도를 자동 분석하고 S~F 등급을 매겨드립니다</p>
        </div>
    </div>
</div>

<div class="container">

    <!-- Keyword Input -->
    <div class="card">
        <div class="card-title">🔍 키워드 입력</div>
        <div class="kw-input-wrap">
            <input type="text" id="keywordInput" placeholder="분석할 키워드를 입력하세요 (최대 10개)"
                   onkeydown="if(event.key==='Enter') addKeyword()">
            <button class="btn-add" onclick="addKeyword()">추가</button>
        </div>
        <div class="keyword-tags" id="keywordTags"></div>
    </div>

    <!-- Action -->
    <div class="action-bar">
        <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">경쟁도 분석</button>
        <button class="btn-reset" onclick="resetAll()">초기화</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>키워드 경쟁도를 분석하고 있습니다...</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
        <div class="results-header">
            <h2>📊 분석 결과</h2>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <div class="toggle-wrap">
                    <button class="toggle-btn active" data-formula="weighted" onclick="switchFormula('weighted')">정밀 분석</button>
                    <button class="toggle-btn" data-formula="basic" onclick="switchFormula('basic')">기본 분석</button>
                </div>
                <button class="btn-csv" onclick="exportCSV()">📥 CSV 다운로드</button>
            </div>
        </div>

        <div class="result-grid" id="resultCards"></div>

        <!-- Summary Table -->
        <div class="card" style="margin-top: 16px;">
            <div class="card-title">📋 비교 요약표</div>
            <div style="overflow-x:auto;">
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>키워드</th>
                            <th>PC 검색수</th>
                            <th>모바일 검색수</th>
                            <th>블로그 문서수</th>
                            <th>유효 검색수</th>
                            <th>경쟁도</th>
                            <th>등급</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Legend -->
        <div class="card" style="margin-top: 16px;">
            <div class="card-title">📖 등급 안내</div>
            <div class="legend-grid">
                <div class="legend-item">
                    <div class="legend-badge" style="background:linear-gradient(135deg,#ff6fd833,#c471f533);color:#c471f5;">S</div>
                    <div class="legend-desc">💎 황금키워드</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#e8f8ef;color:#03C75A;">A</div>
                    <div class="legend-desc">매우 좋음</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#e8f8ef;color:#2ecc71;">B</div>
                    <div class="legend-desc">좋음, 공략 추천</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#fff9e6;color:#f39c12;">C</div>
                    <div class="legend-desc">보통, 글 품질 중요</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#fff3e6;color:#e67e22;">D</div>
                    <div class="legend-desc">경쟁 치열</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#fde8e8;color:#e74c3c;">E</div>
                    <div class="legend-desc">상위노출 어려움</div>
                </div>
                <div class="legend-item">
                    <div class="legend-badge" style="background:#fde8e8;color:#c0392b;">F</div>
                    <div class="legend-desc">진입 비추천</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">Made by <strong>다퍼주는남자</strong> | 네이버 블로그 키워드 경쟁도 분석기 v1.0</div>

<div class="toast" id="toast"></div>

<script>
let currentFormula = 'weighted';
let keywords = [];
let analysisResults = [];

const GRADES = [
    { grade: 'S', max: 0.05, emoji: '💎', desc: '황금키워드', color: '#c471f5' },
    { grade: 'A', max: 0.15, emoji: '🟢', desc: '매우 좋음', color: '#03C75A' },
    { grade: 'B', max: 0.30, emoji: '🟢', desc: '좋음, 공략 추천', color: '#2ecc71' },
    { grade: 'C', max: 0.50, emoji: '🟡', desc: '보통, 글 품질 중요', color: '#f39c12' },
    { grade: 'D', max: 1.00, emoji: '🟠', desc: '경쟁 치열', color: '#e67e22' },
    { grade: 'E', max: 2.00, emoji: '🔴', desc: '상위노출 어려움', color: '#e74c3c' },
    { grade: 'F', max: Infinity, emoji: '⛔', desc: '진입 비추천', color: '#c0392b' },
];

function getGrade(r) { for (const g of GRADES) { if (r <= g.max) return g; } return GRADES[GRADES.length-1]; }

function switchFormula(f) {
    currentFormula = f;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-formula="${f}"]`).classList.add('active');
    renderResults();
}

function addKeyword() {
    const input = document.getElementById('keywordInput');
    const kw = input.value.trim();
    if (!kw) return;
    if (keywords.includes(kw)) { showToast('이미 추가된 키워드입니다.', 'error'); return; }
    if (keywords.length >= 10) { showToast('최대 10개까지 추가 가능합니다.', 'error'); return; }
    keywords.push(kw);
    input.value = '';
    input.focus();
    renderKeywordTags();
}

function removeKeyword(kw) {
    keywords = keywords.filter(k => k !== kw);
    renderKeywordTags();
}

function renderKeywordTags() {
    document.getElementById('keywordTags').innerHTML = keywords.map(kw =>
        `<div class="keyword-tag">${kw}<span class="remove" onclick="removeKeyword('${kw}')">&times;</span></div>`
    ).join('');
}

async function analyze() {
    if (keywords.length === 0) { showToast('키워드를 최소 1개 이상 추가해주세요.', 'error'); return; }
    document.getElementById('loading').classList.add('visible');
    document.getElementById('analyzeBtn').disabled = true;
    try {
        const res = await fetch('/api/naver-api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keywords })
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'API 호출 실패'); }
        const data = await res.json();
        analysisResults = data.results;
        if (data.errors && data.errors.length > 0) {
            console.log('API Errors:', data.errors);
            // 에러 상세 표시
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:#fde8e8;border:1px solid #e74c3c;border-radius:10px;padding:16px;margin-bottom:16px;font-size:0.85rem;color:#c0392b;';
            errDiv.innerHTML = '<strong>⚠️ API 오류:</strong><br>' + data.errors.map(e => '• ' + e).join('<br>');
            document.getElementById('resultCards').before(errDiv);
        }
        document.getElementById('results').classList.add('visible');
        renderResults();
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) { showToast(e.message, 'error'); }
    finally { document.getElementById('loading').classList.remove('visible'); document.getElementById('analyzeBtn').disabled = false; }
}

function renderResults() { renderCards(); renderSummary(); }

function calc(item, f) {
    const { pc, mobile, blogCount } = item;
    const eff = f === 'weighted' ? pc + (mobile * 0.3) : pc + mobile;
    if (eff === 0) return { ratio: Infinity, eff: 0 };
    return { ratio: blogCount / eff, eff: Math.round(eff) };
}

function renderCards() {
    const sorted = [...analysisResults].map(item => {
        const c = calc(item, currentFormula);
        const g = getGrade(c.ratio);
        return { ...item, ...c, ...g };
    }).sort((a, b) => a.ratio - b.ratio);

    document.getElementById('resultCards').innerHTML = sorted.map(item => {
        const rText = item.ratio === Infinity ? '∞' : item.ratio.toFixed(4);
        const total = item.pc + item.mobile;
        return `
        <div class="r-card g-${item.grade}">
            <div class="r-card-top">
                <div class="r-card-keyword">${item.keyword}</div>
                <div class="r-grade-wrap">
                    <div class="r-grade">${item.grade}</div>
                    <div class="r-grade-label">${item.desc}</div>
                </div>
            </div>
            <div class="r-stats">
                <div class="r-stat"><div class="r-stat-label">PC 검색수</div><div class="r-stat-value">${item.pc.toLocaleString()}</div></div>
                <div class="r-stat"><div class="r-stat-label">모바일 검색수</div><div class="r-stat-value">${item.mobile.toLocaleString()}</div></div>
                <div class="r-stat"><div class="r-stat-label">월간 총 검색수</div><div class="r-stat-value">${total.toLocaleString()}</div></div>
                <div class="r-stat"><div class="r-stat-label">블로그 문서수</div><div class="r-stat-value">${item.blogCount.toLocaleString()}</div></div>
            </div>
            <div class="r-bottom">
                <span class="r-comp-label">경쟁도</span>
                <span class="r-comp-value" style="color:${item.color}">${rText}</span>
            </div>
        </div>`;
    }).join('');
}

function renderSummary() {
    const sorted = [...analysisResults].map(item => {
        const c = calc(item, currentFormula);
        const g = getGrade(c.ratio);
        return { ...item, ...c, ...g };
    }).sort((a, b) => a.ratio - b.ratio);

    document.getElementById('summaryBody').innerHTML = sorted.map(item => {
        const rText = item.ratio === Infinity ? '∞' : item.ratio.toFixed(4);
        return `<tr>
            <td>${item.keyword}</td>
            <td>${item.pc.toLocaleString()}</td>
            <td>${item.mobile.toLocaleString()}</td>
            <td>${item.blogCount.toLocaleString()}</td>
            <td>${item.eff.toLocaleString()}</td>
            <td style="color:${item.color};font-weight:700;">${rText}</td>
            <td><span class="grade-pill pill-${item.grade}">${item.grade}</span></td>
        </tr>`;
    }).join('');
}

function exportCSV() {
    if (analysisResults.length === 0) return;
    const BOM = '\uFEFF';
    let csv = BOM + '키워드,PC검색수,모바일검색수,월간총검색수,블로그문서수,유효검색수,경쟁도,등급\n';
    analysisResults.forEach(item => {
        const c = calc(item, currentFormula);
        const g = getGrade(c.ratio);
        csv += `${item.keyword},${item.pc},${item.mobile},${item.pc+item.mobile},${item.blogCount},${c.eff},${c.ratio===Infinity?'∞':c.ratio.toFixed(4)},${g.grade}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `키워드경쟁도_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('CSV 파일이 다운로드되었습니다.', 'success');
}

function resetAll() {
    analysisResults = [];
    keywords = [];
    document.getElementById('results').classList.remove('visible');
    document.getElementById('keywordTags').innerHTML = '';
    document.getElementById('keywordInput').value = '';
    showToast('초기화 완료', 'success');
}

function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} visible`;
    setTimeout(() => t.classList.remove('visible'), 3000);
}
</script>
